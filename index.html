<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Product Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="container">
      <div class="product-image">
        <img

      <div class="content">
        <h1>Nike Air Max</h1>

        </p>

        <button>Buy Now</button>
      </div>
    </section>

</html>
